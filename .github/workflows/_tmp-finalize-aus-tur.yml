name: Finalize AUS TUR ZIP audit

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_tmp-finalize-aus-tur.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply verified mappings
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          from collections import Counter

          path = Path('src/stickerAssets.js')
          text = path.read_text(encoding='utf-8')

          imports = '''import { ASSET_TUR14 } from "./stickerAssetTUR14.js";
          import { ASSET_TUR15 } from "./stickerAssetTUR15.js";
          import { ASSET_TUR16 } from "./stickerAssetTUR16.js";
          import { ASSET_TUR17 } from "./stickerAssetTUR17.js";
          import { ASSET_TUR18 } from "./stickerAssetTUR18.js";
          import { ASSET_TUR19 } from "./stickerAssetTUR19.js";
          import { ASSET_TUR20 } from "./stickerAssetTUR20.js";

          '''
          if 'ASSET_TUR14' not in text:
              text = imports + text

          marker = 'export const STICKER_ASSETS = {\n'
          block = '''export const STICKER_ASSETS = {
            ...ASSET_TUR14,
            ...ASSET_TUR15,
            ...ASSET_TUR16,
            ...ASSET_TUR17,
            ...ASSET_TUR18,
            ...ASSET_TUR19,
            ...ASSET_TUR20,

          // AUS — fotos del ZIP validadas por nombre impreso
          "AUS2": "/stickers/AUS2.jpg",
          "AUS4": "/stickers/AUS4.jpg",
          "AUS5": "/stickers/AUS5.jpg",
          "AUS6": "/stickers/AUS6.jpg",
          "AUS7": "/stickers/AUS7.jpg",
          "AUS8": "/stickers/AUS8.jpg",
          "AUS9": "/stickers/AUS9.jpg",
          "AUS10": "/stickers/AUS10.jpg",
          "AUS11": "/stickers/AUS11.jpg",
          "AUS14": "/stickers/AUS14.jpg",
          "AUS17": "/stickers/AUS17.jpg",
          "AUS18": "/stickers/AUS18.jpg",
          "AUS19": "/stickers/AUS19.jpg",

          // TUR — fotos del ZIP validadas por nombre impreso
          "TUR1": "/stickers/TUR1.jpg",
          "TUR2": "/stickers/TUR2.jpg",
          "TUR3": "/stickers/TUR3.jpg",
          "TUR4": "/stickers/TUR4.jpg",
          "TUR5": "/stickers/TUR5.jpg",
          "TUR6": "/stickers/TUR6.jpg",
          "TUR7": "/stickers/TUR7.jpg",
          "TUR9": "/stickers/TUR9.jpg",
          "TUR12": "/stickers/TUR12.jpg",
          '''
          if '"AUS2"' not in text:
              if marker not in text:
                  raise SystemExit('STICKER_ASSETS marker not found')
              text = text.replace(marker, block, 1)

          keys = re.findall(r'"([A-Z]{3}\d+)"\s*:', text)
          duplicates = sorted(k for k, n in Counter(keys).items() if n > 1)
          if duplicates:
              raise SystemExit(f'Duplicate sticker keys: {duplicates}')

          path.write_text(text, encoding='utf-8')
          PY

          node --check src/stickerAssets.js
          for file in src/stickerAssetTUR{14,15,16,17,18,19,20}.js; do node --check "$file"; done

      - name: Commit final clean change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_tmp-finalize-aus-tur.yml
          git add src/stickerAssets.js
          git commit -m "fix: map verified AUS and TUR ZIP photos"
          git push origin HEAD:main
